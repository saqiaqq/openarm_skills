skill_server:
  ros__parameters:
    # ------------------------------------------------------------------
    # MoveIt planning groups (must match openarm_bimanual.srdf)
    # ------------------------------------------------------------------
    left_arm_group: "left_arm"
    right_arm_group: "right_arm"
    left_gripper_group: "left_gripper"
    right_gripper_group: "right_gripper"
    upper_body_group: "upper_body"
    # Must match the URDF root used by demo.launch.py (v10 bimanual → "world").
    base_frame: "world"
    left_eef_link: "openarm_left_hand_tcp"
    right_eef_link: "openarm_right_hand_tcp"
    goal_position_tolerance_m: 0.01
    goal_orientation_tolerance_rad: 0.1

    # ------------------------------------------------------------------
    # Motion defaults  (PRD task 1 / 6: low speed during grasp/place)
    # ------------------------------------------------------------------
    default_speed_scale: 0.10        # for pre-grasp / descent / lift / release
    transport_speed_scale: 0.30      # higher speed when carrying between points
    cartesian_eef_step_m: 0.005
    # Joint-space jump threshold for computeCartesianPath.
    # 0.0 = disabled (dangerous: allows silent 2π IK flips between waypoints,
    # which cause "wild rotation" even when fraction=100%).
    # 1.0 = any joint changing > 1 rad between consecutive 5mm waypoints is
    # rejected. At 5mm step in a well-conditioned configuration, adjacent IK
    # solutions differ by < 0.1 rad; 1.0 catches IK branch flips (typically
    # 2-π rad) and elbow flips (typically ~2 rad). The old 5.0 value let a
    # full branch flip pass undetected, causing the arm to swing wildly during
    # an otherwise "frac=1.00" descent.
    cartesian_jump_threshold: 1.0
    cartesian_min_fraction: 0.95     # < threshold -> treat as plan failure
    approach_offset_m: 0.05
    retreat_offset_m: 0.05
    step_timeout_s: 10.0
    planning_time_s: 15.0
    plan_retry_count: 2
    grasp_retry_count: 1
    # RViz / fake-hardware 调试用：没有真实物体时，夹爪会完全闭合，
    # 正常逻辑会判定 GRIP_NOT_HELD 并中止。打开后会假定已经抓住，
    # 继续执行后续 place 流程；真实机器人抓取测试前请改回 false。
    debug_assume_grasp_success: false

    # ------------------------------------------------------------------
    # Gripper finger targets (m).  Match SRDF group_state values.
    # ------------------------------------------------------------------
    gripper_open_pos: 0.040
    gripper_half_pos: 0.020
    gripper_closed_pos: 0.0
    gripper_close_threshold_m: 0.001  # below this finger position => "not gripped"
    gripper_max_force_n: 40.0          # clamp requested force/max_effort; 0 means controller default
    gripper_default_speed: 0.5         # default gripper speed scale used when request speed is 0
    # Extra clearance (m) added to target_radius when planning EEF paths around the object sphere.
    eef_obstacle_margin_m: 0.02

    # ------------------------------------------------------------------
    # Workspace safety bounds in base frame (rough sphere check)
    # ------------------------------------------------------------------
    workspace_radius_m: 1.20
    min_z_m: -0.10
    max_z_m: 1.50

    # ------------------------------------------------------------------
    # Perception / external services
    # ------------------------------------------------------------------
    perception_service: "/openarm/detect_grasp_pose"
    perception_timeout_s: 5.0

    # ------------------------------------------------------------------
    # Tray carry (/openarm/carry_action)
    # ------------------------------------------------------------------
    # Elbow angle for carry pose: 92 deg (+2 deg vs nominal 90) to level bimanual carry.
    carry_joint4_rad: 1.6057
    # Default carry keeps all arm joints at home except joint4. Width changes use
    # joint2 and joint5 equally so the gripper stays level.
    carry_joint6_rad: 0.0
    carry_joint7_rad: 0.0
    # Default lateral TCP-to-TCP width (m) when only joint4 moves from home.
    carry_default_width_m: 0.307

    # ------------------------------------------------------------------
    # Hand-water delivery (/openarm/hand_water)
    # ------------------------------------------------------------------
    hand_water_speed_scale: 0.10
    hand_water_approach_offset_m: 0.05
    hand_water_retreat_offset_m: 0.05
    hand_water_target_radius_m: 0.06
    # pick.approach 避障球：与身后固定抓取点匹配，勿随运输碰撞半径放大
    hand_water_pick_sphere_m: 0.04
    # 60–80 mm PET bottle; gripped width ~40–60 mm → open 40 mm, transport sphere 60 mm radius
    hand_water_gripper_open_m: 0.040
    hand_water_bottle_attach_offset_m: 0.10
    hand_water_gripper_force: 12.0
    hand_water_gripper_speed: 0.3
